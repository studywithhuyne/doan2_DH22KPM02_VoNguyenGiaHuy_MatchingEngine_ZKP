# docker-compose.yml

services:
  db:
    # PostgreSQL 17 (Latest Stable) with lightweight Alpine Linux
    image: postgres:17-alpine
    container_name: cex_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: cex_db
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init scripts run once on first container start (alphabetical order)
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cex_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cex_net

  backend:
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: cex_backend
    restart: always
    environment:
      DATABASE_URL: postgres://admin:admin@db:5432/cex_db
      RUST_LOG: info
      BINANCE_API_BASE_URL: ${BINANCE_API_BASE_URL:-https://api.binance.com/api/v3}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    # Port 3000 is also exposed for direct API access / debugging.
    # Remove this mapping in a hardened production environment
    # (traffic should only enter through the Nginx proxy on port 8080).
    ports:
      - "3000:3000"
    networks:
      - cex_net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: cex_web
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - cex_net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: cex_prometheus
    restart: always
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "9090:9090"
    networks:
      - cex_net

  grafana:
    image: grafana/grafana:11.2.2
    container_name: cex_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    networks:
      - cex_net

networks:
  cex_net:
    driver: bridge

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
