# docker-compose.yml
version: '3.8'

services:
  db:
    # Upgrade to PostgreSQL 17 (Latest Stable) with lightweight Alpine Linux
    image: postgres:17-alpine
    container_name: cex_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: cex_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: